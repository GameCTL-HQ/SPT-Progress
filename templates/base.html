{{define "head"}}
<!DOCTYPE html>
<html lang="en" class="bg-slate-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} · {{.Brand}} SPT Progress</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; }
    .gl { color: #f59e0b; font-weight: 800; }
    .lb { color: #e2e8f0; font-weight: 600; }
    .card { background: rgb(15 23 42 / .7); border: 1px solid rgb(51 65 85 / .5); border-radius: .75rem; }
  </style>
</head>
<body class="text-slate-200 min-h-screen">
  <div class="min-h-screen flex flex-col">
    <header class="border-b border-slate-800/60">
      <div class="max-w-6xl mx-auto px-6 py-4 flex items-center gap-3">
        <a href="/" class="flex items-center gap-2">
          <span class="text-amber-400 text-xl">⚙</span>
          <span><span class="gl">{{.Brand}}</span> <span class="lb">SPT Progress</span></span>
        </a>
        <nav class="ml-auto flex items-center gap-5 text-sm">
          <a href="/" class="text-slate-400 hover:text-slate-100 transition">Players</a>
        </nav>
      </div>
    </header>
    <main class="max-w-6xl mx-auto px-6 py-8 w-full flex-1">
{{end}}

{{define "footer"}}
    </main>
    <footer class="border-t border-slate-800/50 py-6 text-center text-xs text-slate-500">
      Live data — auto-cached for 30s · read straight from the SPT server profiles · {{.Brand}}
    </footer>
  </div>
</body>
</html>
{{end}}
